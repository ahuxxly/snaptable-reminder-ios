name: Publish App Store Site

on:
  push:
    branches:
      - master
      - main
    paths:
      - site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize App Store URLs
        run: |
          {
            echo "### App Store URLs"
            echo ""
            echo "- Privacy Policy URL: ${{ steps.deployment.outputs.page_url }}privacy.html"
            echo "- Support URL: ${{ steps.deployment.outputs.page_url }}support.html"
          } >> "$GITHUB_STEP_SUMMARY"
