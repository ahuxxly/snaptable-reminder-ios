name: SnapTableReminder
options:
  bundleIdPrefix: com.snaptable
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
targets:
  SnapTableReminder:
    type: application
    platform: iOS
    sources:
      - SnapTableReminder
    resources:
      - path: SnapTableReminder/Resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snaptable.reminder
        INFOPLIST_FILE: SnapTableReminder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: SnapTableReminder/Resources/Info.plist
      properties:
        CFBundleDisplayName: SnapTable
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: SnapTable uses the camera to scan documents when you choose to capture one.
        NSPhotoLibraryUsageDescription: SnapTable imports images you select for on-device text recognition.
        NSUserNotificationsUsageDescription: SnapTable sends local reminders for dates you save.
  SnapTableReminderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SnapTableReminderTests
    dependencies:
      - target: SnapTableReminder
